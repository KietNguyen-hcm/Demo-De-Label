<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleSheet.css">
    <script defer src="script.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <script>
        function toggleMenu() {
        const menu = document.getElementById("menu");
        const hamburger = document.querySelector(".hamburger");

        menu.classList.toggle("active");
        hamburger.classList.toggle("active");
    }
    </script>
    <script>
        document.addEventListener("click", function(e) {
        const menu = document.getElementById("menu");
        const hamburger = document.querySelector(".hamburger");

        if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
            menu.classList.remove("active");
            hamburger.classList.remove("active");
        }
        });
    </script>
    <title>De Label</title>
</head>
<body data-barba="wrapper">
    <header>
        <section class="logo">
            <a href="index.html">
                <img src="img/logo.png">
             </a>
        </section>

        <!-- Nút hamburger -->
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav id="menu">
            <a href="index.html">HOME</a>
            <a href="aboutUs.html">ABOUT US</a>
            <a href="products.html">PRODUCTS</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>
    <main data-barba="container" data-barba-namespace="home">
    <h1 class="headTitle">
        CONTACT
    </h1>
        <section class="contactInfo">
            <p>Email: delabel.official25@gmail.com</p>
            <p>Facebook: <a href="https://www.facebook.com/profile.php?id=61587188978870" target="_blank">De Label</a></p>
            <p>Instagram: <a href="https://www.instagram.com/official_delabel/" target="_blank">De Label Official</a></p>
        </section>
    </main>
</body>
</html>
